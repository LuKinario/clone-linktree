<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Links rápidos da LuKinario Tech" />
    <title>LuKinario Tech</title>
    <link rel="icon" href="images/lukinario_4k_enhanced.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand"><span>Lu</span>Kinario</div>
        <button
          class="button button--small"
          data-link="https://github.com/LuKinario"
        >
          Copiar GitHub
        </button>
      </header>

      <main class="profile-card">
        <div class="avatar">
          <img src="images/lukinario_4k_enhanced.png" alt="Avatar LuKinario" />
        </div>
        <h1>LuKinario</h1>
        <p class="subtitle">Tecnologia, vendas e presença digital.</p>

        <div class="links-grid">
          <div class="tile">
            <a
              href="https://www.mercadolivre.com.br/pagina/lukinariotech"
              target="_blank"
              rel="noreferrer noopener"
            >
              <span class="tile-icon">ML</span>
              <span>Mercado Livre</span>
            </a>
            <button
              class="button"
              type="button"
              data-link="https://www.mercadolivre.com.br/pagina/lukinariotech"
            >
              Copiar
            </button>
          </div>

          <div class="tile">
            <a
              href="https://shopee.com.br/"
              target="_blank"
              rel="noreferrer noopener"
            >
              <span class="tile-icon">S</span>
              <span>Shopee</span>
            </a>
            <button
              class="button"
              type="button"
              data-link="https://shopee.com.br/"
            >
              Copiar
            </button>
          </div>

          <div class="tile">
            <a
              href="https://www.instagram.com/lukinario/"
              target="_blank"
              rel="noreferrer noopener"
            >
              <span class="tile-icon">I</span>
              <span>Instagram</span>
            </a>
            <button
              class="button"
              type="button"
              data-link="https://www.instagram.com/lukinario/"
            >
              Copiar
            </button>
          </div>

          <div class="tile">
            <a
              href="https://github.com/LuKinario"
              target="_blank"
              rel="noreferrer noopener"
            >
              <span class="tile-icon">GH</span>
              <span>GitHub</span>
            </a>
            <button
              class="button"
              type="button"
              data-link="https://github.com/LuKinario"
            >
              Copiar
            </button>
          </div>
        </div>
      </main>

      <footer class="footer">
        <div class="footer-brand">© lukinariotech</div>
      </footer>
    </div>

    <div class="toast" aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
